name: deploy-mainnet-role-runtime

on:
  workflow_dispatch:
    inputs:
      preview_run_id:
        description: "Successful preview workflow run id used for promotion"
        required: true
        type: string
      inventory_path:
        description: "Deployment inventory JSON path"
        required: true
        type: string
      dkg_summary_path:
        description: "DKG summary JSON path"
        required: true
        type: string
      dkg_completion_path:
        description: "Optional DKG completion JSON path"
        required: false
        default: ""
        type: string
      existing_bridge_summary_path:
        description: "Optional existing bridge summary JSON path"
        required: false
        default: ""
        type: string
      app_binaries_release_tag:
        description: "Pinned app binaries release tag"
        required: true
        type: string
      app_runtime_ami_release_tag:
        description: "Pinned app runtime AMI release tag"
        required: true
        type: string
      shared_proof_services_image_release_tag:
        description: "Pinned shared proof image release tag"
        required: true
        type: string
      wireguard_role_ami_release_tag:
        description: "Pinned wireguard role AMI release tag"
        required: true
        type: string
      operator_stack_ami_release_tag:
        description: "Optional operator stack AMI release tag"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  deploy-mainnet:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_STATIC_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_STATIC_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials (OIDC Role)
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-duration-seconds: 21600
          aws-region: us-east-1

      - name: Configure AWS Credentials (Static Secrets)
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' && env.AWS_STATIC_ACCESS_KEY_ID != '' && env.AWS_STATIC_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Validate Pinned Release Tags
        shell: bash
        run: |
          set -euo pipefail
          tags=(
            "${{ inputs.app_binaries_release_tag }}"
            "${{ inputs.app_runtime_ami_release_tag }}"
            "${{ inputs.shared_proof_services_image_release_tag }}"
            "${{ inputs.wireguard_role_ami_release_tag }}"
          )
          if [[ -n "${{ inputs.operator_stack_ami_release_tag }}" ]]; then
            tags+=("${{ inputs.operator_stack_ami_release_tag }}")
          fi
          for tag in "${tags[@]}"; do
            [[ "$tag" != *latest* ]] || {
              echo "must not use latest tags: $tag" >&2
              exit 1
            }
          done

      - name: Verify Preview Success And Soak
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci/out
          preview_run_json="$(gh api "repos/${{ github.repository }}/actions/runs/${{ inputs.preview_run_id }}")"
          preview_workflow_name="$(jq -r '.name' <<<"$preview_run_json")"
          [[ "$preview_workflow_name" == "deploy-preview-role-runtime" || "$preview_workflow_name" == "reset-preview-role-runtime" ]] || {
            echo "preview_run_id must refer to deploy-preview-role-runtime or reset-preview-role-runtime" >&2
            exit 1
          }
          [[ "$(jq -r '.conclusion' <<<"$preview_run_json")" == "success" ]] || {
            echo "preview deploy must have concluded successfully" >&2
            exit 1
          }
          preview_completed_at="$(jq -r '.updated_at' <<<"$preview_run_json")"
          preview_completed_epoch="$(date -u -d "$preview_completed_at" +%s)"
          now_epoch="$(date -u +%s)"
          (( now_epoch - preview_completed_epoch >= 86400 )) || {
            echo "preview deploy must soak for at least 24 hours before mainnet promotion" >&2
            exit 1
          }

          artifact_id="$(gh api "repos/${{ github.repository }}/actions/runs/${{ inputs.preview_run_id }}/artifacts" \
            | jq -r '.artifacts[] | select(.name == "preview-role-runtime-lock") | .id' \
            | head -n 1)"
          [[ -n "$artifact_id" ]] || {
            echo "preview release lock artifact not found" >&2
            exit 1
          }

          gh api "repos/${{ github.repository }}/actions/artifacts/${artifact_id}/zip" > .ci/out/preview-role-runtime-lock.zip
          unzip -q .ci/out/preview-role-runtime-lock.zip -d .ci/out/preview-role-runtime-lock
          lock_file=".ci/out/preview-role-runtime-lock/role-runtime-release-lock.json"
          [[ -f "$lock_file" ]] || {
            echo "role-runtime-release-lock.json missing from preview artifact" >&2
            exit 1
          }

          lock_workflow="$(jq -r '.workflow // empty' "$lock_file")"
          [[ "$lock_workflow" == "$preview_workflow_name" ]] || {
            echo "preview release lock workflow does not match preview workflow run" >&2
            exit 1
          }
          [[ "$(jq -r '.app_binaries_release_tag' "$lock_file")" == "${{ inputs.app_binaries_release_tag }}" ]] || exit 1
          [[ "$(jq -r '.app_runtime_ami_release_tag' "$lock_file")" == "${{ inputs.app_runtime_ami_release_tag }}" ]] || exit 1
          [[ "$(jq -r '.shared_proof_services_image_release_tag' "$lock_file")" == "${{ inputs.shared_proof_services_image_release_tag }}" ]] || exit 1
          [[ "$(jq -r '.wireguard_role_ami_release_tag' "$lock_file")" == "${{ inputs.wireguard_role_ami_release_tag }}" ]] || exit 1
          [[ "$(jq -r '.operator_stack_ami_release_tag // empty' "$lock_file")" == "${{ inputs.operator_stack_ami_release_tag }}" ]] || exit 1

      - name: Download Released Deployment Binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci/bin
          gh release download "${{ inputs.app_binaries_release_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "bridge-deploy_linux_amd64" \
            --pattern "bridge-deploy_linux_amd64.sha256" \
            --dir .ci/bin \
            --clobber
          (
            cd .ci/bin
            sha256sum -c bridge-deploy_linux_amd64.sha256
            chmod 0755 bridge-deploy_linux_amd64
          )

      - name: Patch Inventory With Selected Release Tags
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci/out
          jq \
            --arg app_runtime_ami_release_tag "${{ inputs.app_runtime_ami_release_tag }}" \
            --arg shared_proof_services_image_release_tag "${{ inputs.shared_proof_services_image_release_tag }}" \
            --arg wireguard_role_ami_release_tag "${{ inputs.wireguard_role_ami_release_tag }}" \
            '
              .app_role.ami_release_tag = $app_runtime_ami_release_tag
              | .shared_roles.proof.image_release_tag = $shared_proof_services_image_release_tag
              | .shared_roles.wireguard.ami_release_tag = $wireguard_role_ami_release_tag
              | .wireguard_role.ami_release_tag = $wireguard_role_ami_release_tag
            ' "${{ inputs.inventory_path }}" > .ci/out/inventory.release-inputs.json

      - name: Resolve Role Runtime Release Inputs
        shell: bash
        run: |
          set -euo pipefail
          ./deploy/production/resolve-role-runtime-release-inputs.sh \
            --inventory .ci/out/inventory.release-inputs.json \
            --output .ci/out/inventory.resolved.json \
            --github-repo "${{ github.repository }}"

      - name: Verify Preview Queue Topology
        shell: bash
        run: |
          set -euo pipefail
          lock_file=".ci/out/preview-role-runtime-lock/role-runtime-release-lock.json"
          resolved_inventory=".ci/out/inventory.resolved.json"
          normalize_driver() {
            tr '[:upper:]' '[:lower:]' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
          }
          require_driver() {
            local label="$1"
            local driver="$2"
            case "$driver" in
              kafka|postgres) ;;
              *)
                printf '%s must be kafka or postgres, got: %s\n' "$label" "$driver" >&2
                exit 1
                ;;
            esac
          }
          require_optional_driver() {
            local label="$1"
            local driver="$2"
            case "$driver" in
              ""|kafka|postgres) ;;
              *)
                printf '%s must be kafka, postgres, or empty, got: %s\n' "$label" "$driver" >&2
                exit 1
                ;;
            esac
          }
          compare_driver() {
            local label="$1"
            local preview_value="$2"
            local mainnet_value="$3"
            if [[ "$preview_value" != "$mainnet_value" ]]; then
              printf 'preview queue topology mismatch for %s: preview=%s mainnet=%s\n' "$label" "$preview_value" "$mainnet_value" >&2
              exit 1
            fi
          }
          require_lock_output() {
            local output_name="$1"
            jq -e --arg output_name "$output_name" '(.shared_infra_e2e_outputs // []) | index($output_name)' "$lock_file" >/dev/null || {
              printf 'preview lock missing required shared infra e2e output: %s\n' "$output_name" >&2
              exit 1
            }
          }
          require_msk_retention_mode() {
            local label="$1"
            local mode="$2"
            case "$mode" in
              auto|retain) ;;
              *)
                printf '%s must be auto or retain, got: %s\n' "$label" "$mode" >&2
                exit 1
                ;;
            esac
          }
          require_bool() {
            local label="$1"
            local value="$2"
            case "$value" in
              true|false) ;;
              *)
                printf '%s must be true or false, got: %s\n' "$label" "$value" >&2
                exit 1
                ;;
            esac
          }

          preview_lock_workflow="$(jq -r '.workflow // empty' "$lock_file")"
          preview_shared_terraform_dir="$(jq -r '.shared_terraform_dir // empty' "$lock_file")"
          preview_queue_driver="$(jq -r '.shared_queue_driver // empty' "$lock_file" | normalize_driver)"
          preview_queue_shadow_driver="$(jq -r '.shared_queue_shadow_driver // empty' "$lock_file" | normalize_driver)"
          preview_proof_queue_driver="$(jq -r '.shared_proof_queue_driver // empty' "$lock_file" | normalize_driver)"
          preview_proof_queue_shadow_driver="$(jq -r '.shared_proof_queue_shadow_driver // empty' "$lock_file" | normalize_driver)"
          preview_msk_retention_mode="$(jq -r '.shared_msk_retention_mode // empty' "$lock_file" | normalize_driver)"
          preview_msk_provisioned="$(jq -r 'if has("shared_msk_provisioned") then .shared_msk_provisioned else empty end' "$lock_file")"

          mainnet_shared_terraform_dir="$(jq -r '.shared_services.terraform_dir // empty' "$resolved_inventory")"
          mainnet_queue_driver="$(jq -r '.shared_services.queue.driver // "kafka"' "$resolved_inventory" | normalize_driver)"
          mainnet_queue_shadow_driver="$(jq -r '.shared_services.queue.shadow.driver // empty' "$resolved_inventory" | normalize_driver)"
          mainnet_proof_queue_driver="$(jq -r '.shared_services.proof_queue.driver // .shared_services.queue.driver // "kafka"' "$resolved_inventory" | normalize_driver)"
          mainnet_proof_queue_shadow_driver="$(jq -r '.shared_services.proof_queue.shadow.driver // empty' "$resolved_inventory" | normalize_driver)"
          mainnet_msk_retention_mode="$(jq -r '.shared_services.msk_retention_mode // .shared_services.msk.retention_mode // "auto"' "$resolved_inventory" | normalize_driver)"

          require_driver "preview shared_queue_driver" "$preview_queue_driver"
          require_optional_driver "preview shared_queue_shadow_driver" "$preview_queue_shadow_driver"
          require_driver "preview shared_proof_queue_driver" "$preview_proof_queue_driver"
          require_optional_driver "preview shared_proof_queue_shadow_driver" "$preview_proof_queue_shadow_driver"
          require_msk_retention_mode "preview shared_msk_retention_mode" "$preview_msk_retention_mode"
          require_bool "preview shared_msk_provisioned" "$preview_msk_provisioned"
          require_driver "mainnet shared queue driver" "$mainnet_queue_driver"
          require_optional_driver "mainnet shared queue shadow driver" "$mainnet_queue_shadow_driver"
          require_driver "mainnet shared proof queue driver" "$mainnet_proof_queue_driver"
          require_optional_driver "mainnet shared proof queue shadow driver" "$mainnet_proof_queue_shadow_driver"
          require_msk_retention_mode "mainnet shared MSK retention mode" "$mainnet_msk_retention_mode"

          if [[ "$preview_shared_terraform_dir" != "$mainnet_shared_terraform_dir" ]]; then
            printf 'preview shared terraform dir mismatch: preview=%s mainnet=%s\n' "$preview_shared_terraform_dir" "$mainnet_shared_terraform_dir" >&2
            exit 1
          fi
          compare_driver "shared queue driver" "$preview_queue_driver" "$mainnet_queue_driver"
          compare_driver "shared queue shadow driver" "$preview_queue_shadow_driver" "$mainnet_queue_shadow_driver"
          compare_driver "shared proof queue driver" "$preview_proof_queue_driver" "$mainnet_proof_queue_driver"
          compare_driver "shared proof queue shadow driver" "$preview_proof_queue_shadow_driver" "$mainnet_proof_queue_shadow_driver"
          compare_driver "shared MSK retention mode" "$preview_msk_retention_mode" "$mainnet_msk_retention_mode"

          require_lock_output "shared-infra-e2e.json"
          kafka_path_active="false"
          postgres_path_active="false"
          for selected_queue_driver in "$mainnet_queue_driver" "$mainnet_queue_shadow_driver" "$mainnet_proof_queue_driver" "$mainnet_proof_queue_shadow_driver"; do
            [[ "$selected_queue_driver" != "kafka" ]] || kafka_path_active="true"
            [[ "$selected_queue_driver" != "postgres" ]] || postgres_path_active="true"
          done
          if [[ "$mainnet_queue_driver" == "postgres" && "$kafka_path_active" == "true" ]]; then
            require_lock_output "shared-infra-e2e.kafka-shadow.json"
          fi
          if [[ "$mainnet_queue_driver" == "kafka" && "$postgres_path_active" == "true" ]]; then
            require_lock_output "shared-infra-e2e.postgres-shadow.json"
          fi
          mainnet_msk_provisioned="false"
          if [[ "$mainnet_queue_driver" == "kafka" || ( "$mainnet_queue_driver" == "postgres" && "$mainnet_msk_retention_mode" == "retain" ) ]]; then
            mainnet_msk_provisioned="true"
          fi
          compare_driver "shared MSK provisioned state" "$preview_msk_provisioned" "$mainnet_msk_provisioned"
          queue_topology_requires_operator_preview="false"
          if [[ "$mainnet_queue_driver" != "kafka" || "$mainnet_proof_queue_driver" != "kafka" || -n "$mainnet_queue_shadow_driver" || -n "$mainnet_proof_queue_shadow_driver" ]]; then
            queue_topology_requires_operator_preview="true"
          fi
          if [[ "$preview_lock_workflow" == "deploy-preview-role-runtime" ]]; then
            if [[ -n "${{ inputs.operator_stack_ami_release_tag }}" ]]; then
              echo "operator_stack_ami_release_tag promotion requires reset-preview-role-runtime because deploy-preview-role-runtime does not roll operators" >&2
              exit 1
            fi
            if [[ "$queue_topology_requires_operator_preview" == "true" ]]; then
              echo "queue topology promotion requires reset-preview-role-runtime because deploy-preview-role-runtime does not roll operators" >&2
              exit 1
            fi
          fi

      - name: Run Deploy Coordinator
        shell: bash
        run: |
          set -euo pipefail
          coordinator_args=(
            ./deploy/production/deploy-coordinator.sh
            --inventory .ci/out/inventory.resolved.json
            --dkg-summary "${{ inputs.dkg_summary_path }}"
            --bridge-deploy-binary .ci/bin/bridge-deploy_linux_amd64
            --output-dir .ci/mainnet-output
            --app-binaries-release-tag "${{ inputs.app_binaries_release_tag }}"
            --github-repo "${{ github.repository }}"
          )
          if [[ -n "${{ inputs.dkg_completion_path }}" ]]; then
            coordinator_args+=(--dkg-completion "${{ inputs.dkg_completion_path }}")
          fi
          if [[ -n "${{ inputs.existing_bridge_summary_path }}" ]]; then
            coordinator_args+=(--existing-bridge-summary "${{ inputs.existing_bridge_summary_path }}")
          elif [[ -n "${{ secrets.MAINNET_BRIDGE_DEPLOYER_KEY }}" ]]; then
            printf '%s\n' "${{ secrets.MAINNET_BRIDGE_DEPLOYER_KEY }}" > .ci/out/mainnet-deployer.key
            chmod 0600 .ci/out/mainnet-deployer.key
            coordinator_args+=(--deployer-key-file .ci/out/mainnet-deployer.key)
          else
            echo "existing_bridge_summary_path or MAINNET_BRIDGE_DEPLOYER_KEY secret is required" >&2
            exit 1
          fi
          "${coordinator_args[@]}"

      - name: Provision App Edge
        shell: bash
        run: |
          set -euo pipefail
          ./deploy/production/provision-app-edge.sh \
            --app-deploy .ci/mainnet-output/$(jq -r '.environment' .ci/out/inventory.resolved.json)/app/app-deploy.json

      - name: Run Shared Services Canary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci/out/canaries
          ./deploy/production/canary-shared-services.sh \
            --shared-manifest .ci/mainnet-output/$(jq -r '.environment' .ci/out/inventory.resolved.json)/shared-manifest.json \
            > .ci/out/canaries/shared-services.json
          [[ "$(jq -r '.ready_for_deploy' .ci/out/canaries/shared-services.json)" == "true" ]]

      - name: Run App Canary
        shell: bash
        run: |
          set -euo pipefail
          ./deploy/production/canary-app-host.sh \
            --app-deploy .ci/mainnet-output/$(jq -r '.environment' .ci/out/inventory.resolved.json)/app/app-deploy.json \
            > .ci/out/canaries/app.json
          [[ "$(jq -r '.ready_for_deploy' .ci/out/canaries/app.json)" == "true" ]]
