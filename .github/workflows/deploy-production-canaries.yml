name: deploy-production-canaries

on:
  pull_request:
    paths:
      - "deploy/production/**"
      - ".github/workflows/deploy-production-canaries.yml"
  push:
    branches:
      - main
    paths:
      - "deploy/production/**"
      - ".github/workflows/deploy-production-canaries.yml"

jobs:
  shell-canaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run production deploy shell canaries
        shell: bash
        run: |
          set -euo pipefail
          bash deploy/production/tests/run.sh
